name: Deploy Nuxt to Server

on:
  push:
    branches: [ "latest" ]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 70m # 延长超时时间
          script: |
            # =================================================
            # 1. 暂时关闭 Supabase 以释放内存给 Nuxt 构建
            # =================================================
            echo "🛑 Stopping Supabase to free up memory..."
            # 假设你的 supabase docker-compose 文件在 /root/supabase/docker
            # 如果不是这个路径，请修改！！！
            cd /root/supabase/docker
            docker compose stop

            # =================================================
            # 2. 更新代码并构建 Nuxt
            # =================================================
            echo "⬇️ Pulling code..."
            cd /root/my-nuxt-app
            git fetch --all
            git reset --hard origin/latest
            git pull origin latest

            echo "🏗️ Building Nuxt Docker Image..."
            # 这里的构建现在独占服务器资源，应该会很快
            docker build -t my-nuxt-app .

            # =================================================
            # 3. 重启 Supabase (构建完成后立刻恢复数据库)
            # =================================================
            echo "✅ Build done. Restarting Supabase..."
            cd /root/supabase/docker
            docker compose start

            # 等待几秒确保数据库准备好 (可选)
            sleep 10

            # =================================================
            # 4. 重新启动 Nuxt 容器
            # =================================================
            echo "🚀 Restarting Nuxt App..."
            docker stop nuxt-web || true
            docker rm nuxt-web || true

            docker run -d \
              --name nuxt-web \
              --restart=always \
              -p 3000:3000 \
              --network host \
              -e NUXT_PUBLIC_SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              -e NUXT_PUBLIC_SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
              -e NUXT_SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              -e NUXT_SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
              -e NUXT_SUPABASE_SERVICE_URL="${{ secrets.SUPABASE_URL }}" \
              -e NUXT_SUPABASE_SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -e SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              -e SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}" \
              -e SUPABASE_SECRET_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}" \
              my-nuxt-app

            docker image prune -f
